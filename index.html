<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autchronos — Gestão de Estoque</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--gray-900); background: var(--gray-100); line-height: 1.5; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* === CSS VARIABLES === */
:root {
  --orange: #f97316;
  --orange-dark: #ea580c;
  --gray-900: #111827;
  --gray-800: #1f2937;
  --gray-700: #374151;
  --gray-600: #6b7280;
  --gray-200: #e5e7eb;
  --gray-100: #f3f4f6;
  --gray-50: #fafafa;
  --white: #ffffff;
  --green: #16a34a;
  --amber: #d97706;
  --red: #dc2626;
  --red-dark: #b91c1c;
  --red-50: #fee2e2;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.15);
}

/* === AUTH SCREENS === */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-100);
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(249,115,22,0.04) 20px,
    rgba(249,115,22,0.04) 21px
  );
}
.auth-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 2.5rem;
  width: 100%;
  max-width: 420px;
}
.auth-logo { text-align: center; margin-bottom: 1.5rem; }
.auth-title { font-size: 1.25rem; font-weight: 600; color: var(--gray-900); margin-bottom: 1.5rem; text-align: center; }

/* === FORM ELEMENTS === */
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-900); margin-bottom: 0.375rem; }
.form-group input,
.form-group select {
  width: 100%;
  padding: 0.625rem 0.75rem;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 0.9375rem;
  color: var(--gray-900);
  background: var(--white);
  transition: border-color 0.15s;
}
.form-group input:focus,
.form-group select:focus { outline: none; border-color: var(--orange); }
.form-error { font-size: 0.8125rem; color: var(--red); margin-top: 0.25rem; display: none; }
.form-error.visible { display: block; }
.checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; }
.checkbox-row input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--orange); }

/* === BUTTONS === */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; padding: 0.625rem 1.25rem; border-radius: var(--radius); font-size: 0.9375rem; font-weight: 500; border: none; transition: background 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--orange); color: var(--white); width: 100%; }
.btn-primary:hover { background: var(--orange-dark); }
.btn-secondary { background: var(--gray-100); color: var(--gray-900); border: 1px solid var(--gray-200); }
.btn-secondary:hover { background: var(--gray-200); }
.btn-danger { background: var(--red); color: var(--white); }
.btn-danger:hover { background: var(--red-dark); }
.btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
.btn-icon { background: none; border: none; padding: 0.25rem; color: var(--gray-600); border-radius: 4px; }
.btn-icon:hover { background: var(--gray-100); color: var(--gray-900); }
.btn:focus-visible,
.btn-logout:focus-visible,
.btn-icon:focus-visible,
.modal-close:focus-visible,
.period-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
.auth-links { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--gray-600); }
.auth-links a { color: var(--orange); text-decoration: none; font-weight: 500; }
.auth-links a:hover { text-decoration: underline; }
.auth-error { background: var(--red-50); color: var(--red); border-radius: var(--radius); padding: 0.625rem 0.875rem; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
.auth-error.visible { display: block; }

/* === HEADER === */
.dashboard-header {
  background: var(--gray-800);
  padding: 0 1.5rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
.user-info { display: flex; align-items: center; gap: 0.625rem; color: var(--white); font-size: 0.875rem; }
.avatar {
  width: 36px; height: 36px;
  background: var(--orange);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.875rem; color: var(--white);
  flex-shrink: 0;
}
.btn-logout { background: rgba(255,255,255,0.1); color: var(--white); border: 1px solid rgba(255,255,255,0.2); padding: 0.375rem 0.875rem; border-radius: var(--radius); font-size: 0.875rem; }
.btn-logout:hover { background: rgba(255,255,255,0.2); }

/* === DASHBOARD LAYOUT === */
.dashboard-body { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
.section-title { font-size: 1.125rem; font-weight: 600; color: var(--gray-900); margin-bottom: 1rem; }

/* === SUMMARY CARDS === */
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
.card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; }
.card-label { font-size: 0.8125rem; color: var(--gray-600); margin-bottom: 0.5rem; font-weight: 500; }
.card-value { font-size: 1.75rem; font-weight: 700; color: var(--gray-900); }
.card-value.orange { color: var(--orange); }
.card-value.red { color: var(--red); }

/* === TABLE SECTION === */
.table-section { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 2rem; overflow: hidden; }
.table-toolbar { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; border-bottom: 1px solid var(--gray-200); }
.table-toolbar .search-input { flex: 1; min-width: 160px; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; }
.table-toolbar .search-input:focus { outline: none; border-color: var(--orange); }
.table-toolbar select { padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; background: var(--white); }
.table-actions { margin-left: auto; display: flex; gap: 0.5rem; }
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--gray-100); padding: 0.75rem 1rem; text-align: left; font-size: 0.8125rem; font-weight: 600; color: var(--gray-600); white-space: nowrap; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: var(--gray-200); color: var(--gray-900); }
th.sort-active { color: var(--orange); }
td { padding: 0.75rem 1rem; font-size: 0.875rem; color: var(--gray-900); border-top: 1px solid var(--gray-200); }
tr:hover td { background: var(--gray-50); }
.empty-row td { text-align: center; color: var(--gray-600); padding: 2rem; }

/* === STATUS BADGES === */
.badge { display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.badge-ok { background: #dcfce7; color: var(--green); }
.badge-baixo { background: #fef3c7; color: var(--amber); }
.badge-critico { background: var(--red-50); color: var(--red); }
.badge-entrada { background: #fff7ed; color: var(--orange); }
.badge-saida { background: var(--gray-100); color: var(--gray-600); }
.badge-ajuste { background: #ede9fe; color: #7c3aed; }

/* === MODAL === */
@keyframes modal-overlay-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes modal-box-in {
  0%   { opacity: 0; transform: scale(0);    }
  55%  { opacity: 1; transform: scale(1.06); }
  75%  { transform: scale(0.97); }
  90%  { transform: scale(1.02); }
  100% { transform: scale(1);    }
}
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 1rem;
  animation: modal-overlay-in 0.2s ease;
}
.modal-box {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  transform-origin: center center;
  animation: modal-box-in 0.45s ease-out;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
.modal-header h2 { font-size: 1.0625rem; font-weight: 600; }
.modal-body { padding: 1.5rem; }
.modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 0.75rem; }
.modal-close { background: none; border: none; font-size: 1.25rem; color: var(--gray-600); cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--gray-900); }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }

/* === MOVIMENTO MODAL === */
.mov-tipo-group { display: flex; gap: 0.75rem; margin-bottom: 0; }
.mov-tipo-label {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.625rem; border: 2px solid var(--gray-200); border-radius: var(--radius);
  font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.mov-tipo-label:has(input:checked) { border-color: var(--orange); background: #fff7ed; }
.mov-tipo-label input { display: none; }
.mov-estoque-atual { font-size: 0.8125rem; color: var(--gray-600); margin-bottom: 1rem; }
.mov-estoque-atual strong { color: var(--gray-900); }

/* === CATEGORY MODAL === */
.cat-list { display: flex; flex-direction: column; gap: 0.625rem; margin-bottom: 1rem; }
.cat-item { display: flex; align-items: center; gap: 0.5rem; }
.cat-item input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; }
.cat-item input:focus { outline: none; border-color: var(--orange); }
.cat-item input.error { border-color: var(--red); }
.cat-item-error { font-size: 0.75rem; color: var(--red); margin-top: 0.125rem; }
.cat-add-row { display: flex; gap: 0.5rem; }
.cat-add-row input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; }
.cat-add-row input:focus { outline: none; border-color: var(--orange); }

/* === MOVEMENTS SECTION === */
.movements-section { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }
.period-filter { display: flex; gap: 0.5rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-200); }
.period-btn { padding: 0.375rem 1rem; border-radius: 20px; border: 1px solid var(--gray-200); background: var(--white); font-size: 0.875rem; color: var(--gray-600); }
.period-btn.active { background: var(--orange); color: var(--white); border-color: var(--orange); }
.chart-container { padding: 1.25rem; border-bottom: 1px solid var(--gray-200); min-height: 120px; display: flex; align-items: center; justify-content: center; }
.chart-empty { color: var(--gray-600); font-size: 0.9375rem; }
.chart-container svg { width: 100%; height: auto; }

/* === LOGO SVG === */
.logo-svg { display: flex; align-items: center; gap: 0; }

/* === RESPONSIVE === */
@media (max-width: 1023px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 767px) {
  .cards-grid { grid-template-columns: 1fr; }
  .dashboard-body { padding: 1rem; }
  .modal-box { max-width: 100%; }
  .modal-grid { grid-template-columns: 1fr; }
  .table-actions { margin-left: 0; width: 100%; }
  .table-toolbar { flex-direction: column; align-items: stretch; }
  .table-toolbar .search-input, .table-toolbar select { width: 100%; }
  .period-filter { flex-wrap: wrap; }
  .header-right .user-name { display: none; }
}

/* === DATE RANGE === */
.date-range-row { display: none; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
.date-range-row.visible { display: flex; }
.date-range-row input[type="date"] { padding: 0.375rem 0.5rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; color: var(--gray-900); }
.date-range-row input[type="date"]:focus { outline: none; border-color: var(--orange); }
.date-range-row span { font-size: 0.875rem; color: var(--gray-600); }

/* === ALERTAS === */
.alertas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
.alerta-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1rem 1.25rem; border-left: 4px solid var(--amber); }
.alerta-card.critico { border-left-color: var(--red); }
.alerta-nome { font-weight: 600; font-size: 0.9375rem; margin-bottom: 0.25rem; color: var(--gray-900); }
.alerta-detalhe { font-size: 0.8125rem; color: var(--gray-600); margin-bottom: 0.375rem; }
.alertas-title { font-size: 1.125rem; font-weight: 600; color: var(--gray-900); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }

/* === MOV TOOLBAR === */
.mov-toolbar { display: flex; align-items: center; gap: 0.625rem; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
.mov-toolbar .search-input { flex: 1; min-width: 140px; }
.mov-toolbar select { padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; background: var(--white); }

/* === CHART SUMMARY === */
.chart-summary { display: flex; gap: 2rem; padding: 0.625rem 1.25rem; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); font-size: 0.875rem; flex-wrap: wrap; }
.chart-summary-entrada { color: var(--orange); font-weight: 700; }
.chart-summary-saida { color: var(--gray-700); font-weight: 700; }

/* === LOADING SCREEN === */
#screen-loading {
  position: fixed;
  inset: 0;
  background: var(--gray-800);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  z-index: 999;
  opacity: 1;
  transition: opacity 0.5s ease;
}
#screen-loading.fade-out { opacity: 0; pointer-events: none; }
.loading-logo { animation: pulse-logo 1.2s ease-in-out infinite; }
@keyframes pulse-logo {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(0.97); }
}
.loading-bar-track {
  width: 180px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.loading-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--orange);
  border-radius: 2px;
  animation: bar-fill 1.4s ease forwards;
}
@keyframes bar-fill {
  0%   { width: 0%; }
  60%  { width: 80%; }
  100% { width: 100%; }
}
.loading-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: -1rem;
}
  </style>
</head>
<body>

  <!-- Screen: Login -->
  <div id="screen-login" style="display:none"></div>

  <!-- Screen: Registro -->
  <div id="screen-register" style="display:none"></div>

  <!-- Screen: Dashboard -->
  <div id="screen-dashboard" style="display:none"></div>

  <!-- Modal: Adicionar/Editar Material -->
  <div id="modal-material" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-material-title">Adicionar Material</h2>
        <button class="modal-close" onclick="closeMaterialModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-grid">
          <div class="form-group" style="grid-column:1/-1">
            <label for="m-nome">Nome *</label>
            <input type="text" id="m-nome" maxlength="120">
            <div class="form-error" id="err-m-nome"></div>
          </div>
          <div class="form-group">
            <label for="m-cat">Categoria *</label>
            <select id="m-cat">
              <option value="">Selecione...</option>
            </select>
            <div class="form-error" id="err-m-cat"></div>
          </div>
          <div class="form-group">
            <label for="m-unidade">Unidade *</label>
            <input type="text" id="m-unidade" placeholder="ex: m, kg, un" maxlength="20">
            <div class="form-error" id="err-m-unidade"></div>
          </div>
          <div class="form-group">
            <label for="m-qtd">Quantidade *</label>
            <input type="text" id="m-qtd" placeholder="0">
            <div class="form-error" id="err-m-qtd"></div>
          </div>
          <div class="form-group">
            <label for="m-min">Estoque Mínimo *</label>
            <input type="text" id="m-min" placeholder="0">
            <div class="form-error" id="err-m-min"></div>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label for="m-valor">Valor Unitário (R$)</label>
            <input type="text" id="m-valor" placeholder="0,00">
            <div class="form-error" id="err-m-valor"></div>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label for="m-local">Localização <span style="font-weight:400;color:var(--gray-600)">(opcional)</span></label>
            <input type="text" id="m-local" placeholder="Ex: Depósito A, Prateleira 3, Obra SP..." maxlength="80">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeMaterialModal()">Cancelar</button>
        <button class="btn btn-primary" style="width:auto" onclick="saveMaterial()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Gerenciar Usuários -->
  <div id="modal-usuarios" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:620px">
      <div class="modal-header">
        <h2>Gerenciar Usuários</h2>
        <button class="modal-close" onclick="closeUsuariosModal()">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Nome</th><th>Usuário</th><th>Papel</th><th>Ações</th></tr></thead>
            <tbody id="usuarios-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUsuariosModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Ajuste de Estoque -->
  <div id="modal-ajuste" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h2>Ajuste de Estoque</h2>
        <button class="modal-close" onclick="closeAjusteModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="ajuste-material-nome" style="font-size:1rem;font-weight:600;color:var(--gray-900);margin-bottom:0.25rem"></div>
        <div style="font-size:0.8125rem;color:var(--gray-600);margin-bottom:1rem">Estoque atual: <strong id="ajuste-estoque-atual">—</strong></div>
        <div class="form-group">
          <label for="ajuste-qtd">Nova quantidade real *</label>
          <input type="text" id="ajuste-qtd" placeholder="Quantidade contada fisicamente" autocomplete="off">
          <div class="form-error" id="err-ajuste-qtd"></div>
        </div>
        <p style="font-size:0.8125rem;color:var(--gray-600);margin-top:-0.5rem">A diferença será registrada como movimentação de ajuste.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAjusteModal()">Cancelar</button>
        <button class="btn btn-primary" style="width:auto" onclick="saveAjuste()">Aplicar Ajuste</button>
      </div>
    </div>
  </div>

  <!-- Modal: Histórico do Material -->
  <div id="modal-historico" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:680px">
      <div class="modal-header">
        <h2 id="modal-historico-title">Histórico</h2>
        <button class="modal-close" onclick="closeHistoricoModal()">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Data/Hora</th><th>Tipo</th><th>Quantidade</th><th>Registrado por</th><th>Observação</th></tr>
            </thead>
            <tbody id="historico-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeHistoricoModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Movimentação -->
  <div id="modal-movimento" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h2 id="modal-mov-title">Registrar Movimentação</h2>
        <button class="modal-close" onclick="closeMovimentoModal()">✕</button>
      </div>
      <div class="modal-body">

// === HELPERS ===
function parseDecimal(str) {
  const s = String(str).trim();
  // pt-BR format (comma as decimal separator): strip thousand-separator dots first
  const normalized = s.includes(',') ? s.replace(/\./g, '').replace(',', '.') : s;
  return parseFloat(normalized) || 0;
}
const brl = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const formatBRL = v => brl.format(v);

function calcStatus(quantidade, estoqueMinimo) {
  if (quantidade >= estoqueMinimo) return 'OK';
  if (quantidade >= estoqueMinimo * 0.5) return 'Baixo';
  return 'Crítico';
}

function getInitials(nomeCompleto) {
  const words = (nomeCompleto || '').trim().split(/\s+/).filter(Boolean);
  if (!words.length) return '??';
  if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
  return (words[0][0] + words[1][0]).toUpperCase();
}

// === HTML ESCAPE ===
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function recordMovimento(materialId, materialNome, qtdAnterior, qtdNova, registradoPor, observacao = '') {
  const diff = qtdNova - qtdAnterior;
  if (diff === 0) return;
  const { error } = await _sb.from('movimentacoes').insert({
    material_id: materialId,
    material_nome: materialNome,
    tipo: diff > 0 ? 'entrada' : 'saída',
    quantidade: Math.abs(diff),
    registrado_por: registradoPor,
    observacao: observacao || null
  });
  if (error) console.error('recordMovimento:', error.message);
}

function showFieldError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');

async function doRegister() {
  const nome = document.getElementById('reg-nome').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const senha = document.getElementById('reg-senha').value;
  const confirma = document.getElementById('reg-confirma').value;
  let valid = true;

  ['err-nome', 'err-email', 'err-senha', 'err-confirma'].forEach(clearFieldError);
  const regErr = document.getElementById('reg-error');
  regErr.classList.remove('visible');

  if (!nome) { showFieldError('err-nome', 'Este campo é obrigatório.'); valid = false; }
  else if (nome.length > 100) { showFieldError('err-nome', 'Máximo de 100 caracteres.'); valid = false; }

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('err-email', 'Informe um e-mail válido.'); valid = false;
  }

  if (!senha) { showFieldError('err-senha', 'Este campo é obrigatório.'); valid = false; }
  else if (senha.length < 6) { showFieldError('err-senha', 'Mínimo de 6 caracteres.'); valid = false; }

  if (!confirma) { showFieldError('err-confirma', 'Este campo é obrigatório.'); valid = false; }
  else if (senha && senha !== confirma) { showFieldError('err-confirma', 'As senhas não coincidem.'); valid = false; }

  if (!valid) return;

  const btn = document.querySelector('button[onclick="doRegister()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Criando conta...'; }

  const { error } = await _sb.auth.signUp({
    email,
    password: senha,
    options: { data: { nome_completo: nome } }
  });

  if (error) {
    regErr.textContent = error.message.includes('already registered')
      ? 'Este e-mail já está cadastrado.'
      : error.message;
    regErr.classList.add('visible');
    if (btn) { btn.disabled = false; btn.textContent = 'Criar conta'; }
    return;
  }

  // Aguarda trigger criar o perfil
  await new Promise(r => setTimeout(r, 1000));

  const session = await getAppSession();
  if (!session) {
    regErr.textContent = 'Conta criada! Verifique seu e-mail para confirmar o cadastro.';
    regErr.style.background = '#dcfce7'; regErr.style.color = 'var(--green)';
    regErr.classList.add('visible');
    if (btn) { btn.disabled = false; btn.textContent = 'Criar conta'; }
    return;
  }

  await loadAllData();
  showLoadingScreen(session);
}

function renderCards() {
  const materiais = getMateriais();
  const movs = getMovimentacoes();
  const now = new Date();
  const mesStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const mesEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);

  const totalItens = materiais.length;
  const baixoEstoque = materiais.filter(m => calcStatus(m.quantidade, m.estoqueMinimo) !== 'OK').length;
  const valorTotal = materiais.reduce((s, m) => s + m.quantidade * m.valorUnitario, 0);
  const entradasMes = movs
    .filter(m => m.tipo === 'entrada' && new Date(m.data) >= mesStart && new Date(m.data) <= mesEnd)
    .reduce((s, m) => s + m.quantidade, 0);

  document.getElementById('cards-grid').innerHTML = `
    <div class="card">
      <div class="card-label">Total de Itens</div>
      <div class="card-value">${totalItens}</div>
    </div>
    <div class="card">
      <div class="card-label">Itens em Baixo Estoque</div>
      <div class="card-value ${baixoEstoque > 0 ? 'red' : ''}">${baixoEstoque}</div>
    </div>
    <div class="card">
      <div class="card-label">Valor Total do Estoque</div>
      <div class="card-value orange" style="font-size:1.35rem">${formatBRL(valorTotal)}</div>
    </div>
    <div class="card">
      <div class="card-label">Entradas do Mês</div>
      <div class="card-value">${entradasMes % 1 === 0 ? entradasMes : entradasMes.toFixed(2)}</div>
    </div>
  `;
}

        orphaned.map(c => `<option value="${esc(c)}" ${c === current ? 'selected' : ''}>${esc(c)}</option>`).join('') +

  const filtered = materiais.filter(m => {

    return (
      (!filterNome || m.nome.toLowerCase().includes(filterNome)) &&
      (!filterCat || m.categoria === filterCat) &&
      (!filterStatus || status === filterStatus)

  const tbody = document.getElementById('materials-tbody');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">Nenhum material encontrado.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(m => {
    const status = calcStatus(m.quantidade, m.estoqueMinimo);
    const badgeClass = { OK: 'badge-ok', Baixo: 'badge-baixo', Crítico: 'badge-critico' }[status];
    return `<tr>
      <td>${m.id}</td>
      <td>
        ${esc(m.nome)}

      </td>
      <td>${esc(m.categoria)}</td>
      <td>${m.quantidade % 1 === 0 ? m.quantidade : m.quantidade.toFixed(2)}</td>
      <td>${esc(m.unidade)}</td>
      <td>${m.estoqueMinimo % 1 === 0 ? m.estoqueMinimo : m.estoqueMinimo.toFixed(2)}</td>
      <td><span class="badge ${badgeClass}">${status}</span></td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="openMovimentoModal(${m.id},'entrada')">+ Entrada</button>
        <button class="btn btn-secondary btn-sm" onclick="openMovimentoModal(${m.id},'saída')">− Saída</button>
        <button class="btn btn-secondary btn-sm" onclick="openHistoricoModal(${m.id})">Histórico</button>

let movimentoMaterialId = null;

function openMovimentoModal(id, tipo = 'entrada') {
  movimentoMaterialId = id;
  const material = getMateriais().find(m => m.id === id);
  if (!material) return;

  document.getElementById('modal-mov-title').textContent =
    tipo === 'entrada' ? 'Registrar Entrada' : 'Registrar Saída';
  document.getElementById('mov-material-nome').textContent = material.nome;
  const qtdAtual = material.quantidade % 1 === 0 ? material.quantidade : material.quantidade.toFixed(2);
  document.getElementById('mov-estoque-valor').textContent = `${qtdAtual} ${esc(material.unidade)}`;
  document.querySelector(`input[name="mov-tipo"][value="${tipo}"]`).checked = true;
  document.getElementById('mov-qtd').value = '';
  clearFieldError('err-mov-qtd');

  const btnReg = document.querySelector('button[onclick="saveMovimento()"]');
  if (btnReg) { btnReg.disabled = false; btnReg.textContent = 'Registrar'; }

  document.getElementById('modal-movimento').style.display = 'flex';
  setTimeout(() => document.getElementById('mov-qtd').focus(), 50);
}

function closeMovimentoModal() {
  document.getElementById('modal-movimento').style.display = 'none';
  movimentoMaterialId = null;
}

async function saveMovimento() {
  const tipo = document.querySelector('input[name="mov-tipo"]:checked').value;
  const qtdRaw = document.getElementById('mov-qtd').value;
  clearFieldError('err-mov-qtd');

  const qtd = parseDecimal(qtdRaw);
  if (!qtdRaw.trim() || isNaN(qtd) || qtd <= 0) {
    showFieldError('err-mov-qtd', 'Informe uma quantidade válida maior que zero.');
    return;
  }

  const material = getMateriais().find(m => m.id === movimentoMaterialId);
  if (!material) return;

  const novaQtd = tipo === 'entrada' ? material.quantidade + qtd : material.quantidade - qtd;
  if (novaQtd < 0) {
    const atual = material.quantidade % 1 === 0 ? material.quantidade : material.quantidade.toFixed(2);
    showFieldError('err-mov-qtd', `Estoque insuficiente. Disponível: ${atual} ${material.unidade}.`);
    return;
  }

  const btn = document.querySelector('button[onclick="saveMovimento()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando...'; }

  const observacao = (document.getElementById('mov-observacao')?.value || '').trim();
  const { error: errMov } = await _sb.from('movimentacoes').insert({
    material_id: material.id, material_nome: material.nome,
    tipo, quantidade: qtd,
    registrado_por: currentSession.nomeCompleto,
    observacao: observacao || null
  });
  if (errMov) { alert('Erro: ' + errMov.message); if (btn) { btn.disabled = false; btn.textContent = 'Registrar'; } return; }

  const { error: errUpd } = await _sb.from('materiais').update({ quantidade: novaQtd }).eq('id', material.id);
  if (errUpd) { alert('Erro ao atualizar estoque: ' + errUpd.message); if (btn) { btn.disabled = false; btn.textContent = 'Registrar'; } return; }

  await loadAllData();
  closeMovimentoModal();
  refreshAllSections();
}

function getFilterWindow(period) {
  const now = new Date();
  if (period === 'hoje') {
    const start = new Date(now); start.setHours(0, 0, 0, 0);
    const end = new Date(now); end.setHours(23, 59, 59, 999);
    return { start, end };
  }
  if (period === 'custom') {
    const sv = document.getElementById('custom-start')?.value;
    const ev = document.getElementById('custom-end')?.value;
    const start = sv ? new Date(sv + 'T00:00:00') : new Date(0);
    const end   = ev ? new Date(ev + 'T23:59:59.999') : now;
    return { start, end };
  }
  const days = { '7d': 7, '14d': 14, '30d': 30 }[period];
  const start = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
  start.setHours(0, 0, 0, 0);
  return { start, end: now };
}

function renderMovements() {
  updateMovCatFilter();

  const allMovs = getMovimentacoes();
  const catMap = {};
  getMateriais().forEach(m => { catMap[m.id] = m.categoria; });

  const movsByCat = currentMovCategory
    ? allMovs.filter(m => catMap[m.materialId] === currentMovCategory)
    : allMovs;

  const { start, end } = getFilterWindow(currentPeriod);
  let movs = movsByCat.filter(m => { const d = new Date(m.data); return d >= start && d <= end; });

  // Totalizador (antes dos filtros de busca/tipo)
  const matValMap = {};
  getMateriais().forEach(m => { matValMap[m.id] = m.valorUnitario || 0; });
  const movsEnt = movs.filter(m => m.tipo === 'entrada');
  const movsSai = movs.filter(m => m.tipo === 'saída');
  const totEntradas = movsEnt.reduce((s, m) => s + m.quantidade, 0);
  const totSaidas   = movsSai.reduce((s, m) => s + m.quantidade, 0);
  const totValEnt   = movsEnt.reduce((s, m) => s + m.quantidade * (matValMap[m.materialId] || 0), 0);
  const totValSai   = movsSai.reduce((s, m) => s + m.quantidade * (matValMap[m.materialId] || 0), 0);
  const saldo = totEntradas - totSaidas;
  const fmt = n => n % 1 === 0 ? n : n.toFixed(2);
  const summaryEl = document.getElementById('chart-summary');
  if (summaryEl) {
    summaryEl.innerHTML = movs.length === 0 ? '' :
      `<span>Entradas: <span class="chart-summary-entrada">${fmt(totEntradas)}</span>${totValEnt > 0 ? ` <span style="font-size:0.8125rem;color:var(--gray-600)">(${formatBRL(totValEnt)})</span>` : ''}</span>
       <span>Saídas: <span class="chart-summary-saida">${fmt(totSaidas)}</span>${totValSai > 0 ? ` <span style="font-size:0.8125rem;color:var(--gray-600)">(${formatBRL(totValSai)})</span>` : ''}</span>
       <span>Saldo: <strong style="color:${saldo >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(saldo)}</strong></span>`;
  }

  // Chart
  renderChart(document.getElementById('chart-container'), movsByCat, currentPeriod);

  // Filtros de busca e tipo
  if (currentMovSearch) movs = movs.filter(m => m.materialNome.toLowerCase().includes(currentMovSearch));
  if (currentMovTipo)   movs = movs.filter(m => m.tipo === currentMovTipo);
  movs = movs.sort((a, b) => new Date(b.data) - new Date(a.data));

  const tbody = document.getElementById('movements-tbody');
  if (movs.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhuma movimentação encontrada neste período.</td></tr>';
    return;
  }

  tbody.innerHTML = movs.map(m => {
    const d = new Date(m.data);
    const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const tipoInfo = { entrada:['badge-entrada','Entrada'], saída:['badge-saida','Saída'], ajuste:['badge-ajuste','Ajuste'] };
    const [badgeClass, label] = tipoInfo[m.tipo] || ['badge-saida', m.tipo];
    return `<tr>
      <td>${dateStr}</td>
      <td>
        ${esc(m.materialNome)}
        ${m.observacao ? `<div style="font-size:0.75rem;color:var(--gray-600);font-style:italic;margin-top:0.125rem">${esc(m.observacao)}</div>` : ''}
      </td>
      <td><span class="badge ${badgeClass}">${label}</span></td>
      <td>${fmt(m.quantidade)}</td>
      <td>${esc(m.registradoPor)}</td>
    </tr>`;
  }).join('');
}

function getBuckets(period) {
  const now = new Date();
  const buckets = [];
  const pad2 = n => String(n).padStart(2, '0');
  const fmtDay = d => `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}`;

  if (period === 'hoje') {
    for (let h = 0; h < 24; h++) {
      const start = new Date(now); start.setHours(h, 0, 0, 0);
      const end = new Date(now); end.setHours(h, 59, 59, 999);
      buckets.push({ label: `${pad2(h)}h`, start, end });
    }
  } else if (period === '7d' || period === '14d') {
    const days = period === '7d' ? 7 : 14;
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(now.getTime() - i * 86400000);
      const start = new Date(d); start.setHours(0, 0, 0, 0);
      const end = new Date(d); end.setHours(23, 59, 59, 999);
      buckets.push({ label: fmtDay(d), start, end });
    }
  } else if (period === 'custom') {
    const { start: cs, end: ce } = getFilterWindow('custom');
    const diffDays = Math.max(1, Math.ceil((ce - cs) / 86400000));
    if (diffDays <= 1) {
      for (let h = 0; h < 24; h++) {
        const s = new Date(cs); s.setHours(h, 0, 0, 0);
        const e = new Date(cs); e.setHours(h, 59, 59, 999);
        buckets.push({ label: `${pad2(h)}h`, start: s, end: e });
      }
    } else if (diffDays <= 31) {
      for (let i = 0; i < diffDays; i++) {
        const d = new Date(cs.getTime() + i * 86400000);
        const s = new Date(d); s.setHours(0, 0, 0, 0);
        const e = new Date(d); e.setHours(23, 59, 59, 999);
        buckets.push({ label: fmtDay(d), start: s, end: e });
      }
    } else {
      const weeks = Math.ceil(diffDays / 7);
      for (let i = 0; i < weeks; i++) {
        const s = new Date(cs.getTime() + i * 7 * 86400000); s.setHours(0, 0, 0, 0);
        const eMs = Math.min(cs.getTime() + (i + 1) * 7 * 86400000 - 1, ce.getTime());
        const e = new Date(eMs); e.setHours(23, 59, 59, 999);
        buckets.push({ label: `${fmtDay(s)}–${fmtDay(e)}`, start: s, end: e });
      }
    }
  } else { // 30d — 5 blocks of 6 days, oldest first
    for (let i = 4; i >= 0; i--) {
      const endMs = now.getTime() - i * 6 * 86400000;
      const startMs = endMs - 5 * 86400000;
      const startD = new Date(startMs); startD.setHours(0, 0, 0, 0);
      const endD = new Date(endMs); endD.setHours(23, 59, 59, 999);
      buckets.push({ label: `${fmtDay(startD)}–${fmtDay(endD)}`, start: startD, end: endD });
    }
  }
  return buckets;
}

function renderChart(container, allMovs, period) {
  const buckets = getBuckets(period);
  const rangeStart = buckets[0].start;
  const rangeEnd = buckets[buckets.length - 1].end;
  const movs = allMovs.filter(m => { const d = new Date(m.data); return d >= rangeStart && d <= rangeEnd; });
  const data = buckets.map(b => {
    const inBucket = movs.filter(m => { const d = new Date(m.data); return d >= b.start && d <= b.end; });
    return {
      label: b.label,
      entradas: inBucket.filter(m => m.tipo === 'entrada').reduce((s, m) => s + (Number(m.quantidade) || 0), 0),
      saidas: inBucket.filter(m => m.tipo === 'saída').reduce((s, m) => s + (Number(m.quantidade) || 0), 0)
    };
  });

  const hasData = data.some(d => d.entradas > 0 || d.saidas > 0);
  if (!hasData) {
    container.innerHTML = '<span class="chart-empty">Sem movimentações neste período.</span>';
    return;
  }

  const maxVal = Math.max(...data.flatMap(d => [d.entradas, d.saidas]), 1);
  const W = container.offsetWidth || 700;
  const H = 280;
  const PAD = { top: 28, right: 16, bottom: 56, left: 36 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const groupW = chartW / data.length;
  const barW = Math.max(Math.min(groupW * 0.32, 22), 4);
  const gap = barW * 0.25;
  const fmtN = n => n % 1 === 0 ? n : n.toFixed(1);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;
  svg += `<g transform="translate(${PAD.left},${PAD.top})">`;

  // Y gridlines (4 lines)
  for (let i = 1; i <= 4; i++) {
    const y = chartH - (i / 4) * chartH;
    const val = ((i / 4) * maxVal);
    svg += `<line x1="0" y1="${y}" x2="${chartW}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg += `<text x="-4" y="${y + 4}" text-anchor="end" font-size="9" fill="#9ca3af">${fmtN(val)}</text>`;
  }

  data.forEach((d, i) => {
    const cx = i * groupW + groupW / 2;
    const xE = cx - barW - gap / 2;
    const xS = cx + gap / 2;
    const hE = (d.entradas / maxVal) * chartH;
    const hS = (d.saidas / maxVal) * chartH;

    if (hE > 0) {
      svg += `<rect x="${xE}" y="${chartH - hE}" width="${barW}" height="${hE}" fill="#f97316" rx="2"/>`;
      svg += `<text x="${xE + barW/2}" y="${chartH - hE - 3}" text-anchor="middle" font-size="9" fill="#111827">${fmtN(d.entradas)}</text>`;
    }
    if (hS > 0) {
      svg += `<rect x="${xS}" y="${chartH - hS}" width="${barW}" height="${hS}" fill="#6b7280" rx="2"/>`;
      svg += `<text x="${xS + barW/2}" y="${chartH - hS - 3}" text-anchor="middle" font-size="9" fill="#111827">${fmtN(d.saidas)}</text>`;
    }

    // X label — rotate long labels (30d)
    const labelY = chartH + 14;
    const rotate = period === '30d' ? ` transform="rotate(-25,${cx},${labelY})"` : '';
    svg += `<text x="${cx}" y="${labelY}" text-anchor="middle" font-size="9" fill="#6b7280"${rotate}>${d.label}</text>`;
  });

  // X axis
  svg += `<line x1="0" y1="${chartH}" x2="${chartW}" y2="${chartH}" stroke="#d1d5db" stroke-width="1"/>`;

  // Legend
  const ly = chartH + (period === '30d' ? 42 : 36);
  const lx = chartW / 2;
  svg += `<rect x="${lx - 80}" y="${ly}" width="10" height="10" fill="#f97316" rx="2"/>`;
  svg += `<text x="${lx - 67}" y="${ly + 9}" font-size="10" fill="#374151">Entradas</text>`;
  svg += `<rect x="${lx + 10}" y="${ly}" width="10" height="10" fill="#6b7280" rx="2"/>`;
  svg += `<text x="${lx + 23}" y="${ly + 9}" font-size="10" fill="#374151">Saídas</text>`;

  svg += `</g></svg>`;
  container.innerHTML = svg;
}

async function deleteMaterial(id) {
  if (!guardAdmin()) return;
  const material = getMateriais().find(m => m.id === id);
  if (!material) return;

  if (!confirm(`Deseja excluir o material '${material.nome}'? Esta ação não pode ser desfeita.`)) return;

  const { error } = await _sb.from('materiais').delete().eq('id', id);
  if (error) { alert('Erro ao excluir: ' + error.message); return; }
  // movimentacoes apagadas em cascade pelo banco

  await loadAllData();
  refreshAllSections();
}

function validateDecimalField(value, id) {
  const raw = String(value).replace(/\./g, '').replace(',', '.');
  const num = parseFloat(raw);
  if (value.trim() === '' || isNaN(num) || num < 0) {
    showFieldError(id, 'Informe um número válido ≥ 0.');
    return null;
  }
  return num;
}

async function saveMaterial() {
  if (!guardAdmin()) return;
  const nome = document.getElementById('m-nome').value.trim();
  const cat = document.getElementById('m-cat').value;
  const unidade = document.getElementById('m-unidade').value.trim();
  const qtdRaw = document.getElementById('m-qtd').value;
  const minRaw = document.getElementById('m-min').value;
  const valorRaw = document.getElementById('m-valor').value;
  let valid = true;

  ['err-m-nome','err-m-cat','err-m-unidade','err-m-qtd','err-m-min','err-m-valor'].forEach(clearFieldError);

  if (!nome) { showFieldError('err-m-nome', 'Este campo é obrigatório.'); valid = false; }
  if (!cat) { showFieldError('err-m-cat', 'Selecione uma categoria.'); valid = false; }
  if (!unidade) { showFieldError('err-m-unidade', 'Este campo é obrigatório.'); valid = false; }

  const qtd = validateDecimalField(qtdRaw, 'err-m-qtd');
  if (qtd === null) valid = false;
  const min = validateDecimalField(minRaw, 'err-m-min');
  if (min === null) valid = false;

  const valorStr = valorRaw.trim();
  const valor = valorStr === '' ? 0 : parseDecimal(valorStr);
  if (!isFinite(valor)) {
    showFieldError('err-m-valor', 'Informe um valor numérico válido.');
    valid = false;
  }

  if (!valid) return;

  const localizacao = document.getElementById('m-local').value.trim() || null;
  const btn = document.querySelector('button[onclick="saveMaterial()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  if (editingMaterialId) {
    const old = getMateriais().find(m => m.id === editingMaterialId);
    if (!old) { alert('Material não encontrado.'); closeMaterialModal(); return; }

    const { error } = await _sb.from('materiais').update({
      nome, categoria: cat, quantidade: qtd, unidade,
      estoque_minimo: min, valor_unitario: valor, localizacao
    }).eq('id', editingMaterialId);
    if (error) { alert('Erro ao salvar: ' + error.message); if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; } return; }

    await recordMovimento(old.id, old.nome, old.quantidade, qtd, currentSession.nomeCompleto);
  } else {
    const { error } = await _sb.from('materiais').insert({
      nome, categoria: cat, quantidade: qtd, unidade,
      estoque_minimo: min, valor_unitario: valor, localizacao
    });
    if (error) { alert('Erro ao salvar: ' + error.message); if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; } return; }
  }

  await loadAllData();
  closeMaterialModal();
  refreshAllSections();
}

function renameCategory(input) {
  if (!guardAdmin()) return;
  const oldName = input.dataset.original;
  const newName = input.value.trim();
  const errEl = input.dataset.errid ? document.getElementById(input.dataset.errid) : null;

  if (!newName) { input.value = oldName; return; }
  if (newName === oldName) return;

  if (getCategorias().some(c => c.toLowerCase() === newName.toLowerCase() && c !== oldName)) {
    input.value = oldName;
    if (errEl) { errEl.textContent = 'Esta categoria já existe.'; errEl.style.display = 'block'; setTimeout(() => { errEl.style.display = 'none'; }, 3000); }
    return;
  }

  _sb.from('categorias').update({ nome: newName }).eq('nome', oldName).then(async ({ error }) => {
    if (error) { input.value = oldName; alert('Erro ao renomear: ' + error.message); return; }
    const { error: errMat } = await _sb.from('materiais').update({ categoria: newName }).eq('categoria', oldName);
    if (errMat) { alert('Categoria renomeada, mas erro ao atualizar materiais: ' + errMat.message); }
    await loadAllData();
    renderCategoryList();
    renderMaterialsTable();
  });
}

function addCategory() {
  if (!guardAdmin()) return;
  const input = document.getElementById('cat-new-input');
  const name = input.value.trim();
  if (!name) return;

  if (getCategorias().some(c => c.toLowerCase() === name.toLowerCase())) {
    input.style.borderColor = 'var(--red)';
    setTimeout(() => { input.style.borderColor = ''; }, 2000);
    return;
  }

  _sb.from('categorias').insert({ nome: name }).then(async ({ error }) => {
    if (error) { alert('Erro ao adicionar categoria: ' + error.message); return; }
    await loadAllData();
    renderCategoryList();
  });
}

function deleteCategory(name) {
  if (!guardAdmin()) return;
  if (getCategorias().length <= 1) return;
  const count = getMateriais().filter(m => m.categoria === name).length;

  if (count > 0 && !confirm(`${count} material(is) usa(m) esta categoria. Deseja excluir mesmo assim?`)) return;

  _sb.from('categorias').delete().eq('nome', name).then(async ({ error }) => {
    if (error) { alert('Erro ao excluir categoria: ' + error.message); return; }
    await loadAllData();
    if (count > 0) { renderCards(); renderMaterialsTable(); }
    renderCategoryList();
  });
}
function deleteCategoryByIndex(idx) {
  const cats = getCategorias().slice().sort();
  if (idx >= 0 && idx < cats.length) deleteCategory(cats[idx]);
}

function setPeriod(p) {
  currentPeriod = p;
  ['hoje','7d','14d','30d','custom'].forEach(k => {

  });
  const dr = document.getElementById('custom-date-range');
  if (dr) dr.classList.toggle('visible', p === 'custom');
  if (p !== 'custom') renderMovements();
}

// === ALERTAS ===
function renderAlertas() {
  const el = document.getElementById('alertas-section');
  if (!el) return;
  const alertas = getMateriais()
    .filter(m => calcStatus(m.quantidade, m.estoqueMinimo) !== 'OK')
    .sort((a, b) => {
      const ord = { 'Crítico': 0, 'Baixo': 1 };
      return ord[calcStatus(a.quantidade, a.estoqueMinimo)] - ord[calcStatus(b.quantidade, b.estoqueMinimo)];
    });
  if (alertas.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="alertas-title">&#9888; Alertas de Estoque <span style="font-size:0.875rem;font-weight:400;color:var(--gray-600)">(${alertas.length} item${alertas.length > 1 ? 's' : ''})</span></div>
    <div class="alertas-grid">
      ${alertas.map(m => {
        const status = calcStatus(m.quantidade, m.estoqueMinimo);
        const fmt = v => v % 1 === 0 ? v : v.toFixed(2);
        return `<div class="alerta-card ${status === 'Crítico' ? 'critico' : ''}">
          <div class="alerta-nome">${esc(m.nome)}</div>
          <div class="alerta-detalhe">Estoque: <strong>${fmt(m.quantidade)} ${esc(m.unidade)}</strong> &nbsp;|&nbsp; Mín: <strong>${fmt(m.estoqueMinimo)}</strong></div>
          <span class="badge ${status === 'Crítico' ? 'badge-critico' : 'badge-baixo'}">${status}</span>
          <span style="font-size:0.8125rem;color:var(--gray-600);margin-left:0.375rem">${esc(m.categoria)}</span>
        </div>`;
      }).join('')}
    </div>`;
}

// === HISTÓRICO POR MATERIAL ===
function openHistoricoModal(id) {
  const material = getMateriais().find(m => m.id === id);
  document.getElementById('modal-historico-title').textContent =
    `Histórico — ${material ? esc(material.nome) : '#' + id}`;
  const movs = getMovimentacoes()
    .filter(m => m.materialId === id)
    .sort((a, b) => new Date(b.data) - new Date(a.data));
  const fmt = n => n % 1 === 0 ? n : n.toFixed(2);
  const tbody = document.getElementById('historico-tbody');
  tbody.innerHTML = movs.length === 0
    ? '<tr class="empty-row"><td colspan="5">Nenhuma movimentação registrada.</td></tr>'
    : movs.map(m => {
        const d = new Date(m.data);
        const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const tipoInfo = { entrada:['badge-entrada','Entrada'], saída:['badge-saida','Saída'], ajuste:['badge-ajuste','Ajuste'] };
        const [badgeClass, label] = tipoInfo[m.tipo] || ['badge-saida', m.tipo];
        return `<tr>
          <td>${dateStr}</td>
          <td><span class="badge ${badgeClass}">${label}</span></td>
          <td>${fmt(m.quantidade)}</td>
          <td>${esc(m.registradoPor)}</td>
          <td style="color:var(--gray-600);font-style:italic;font-size:0.8125rem">${m.observacao ? esc(m.observacao) : '—'}</td>
        </tr>`;
      }).join('');
  document.getElementById('modal-historico').style.display = 'flex';
}

function closeHistoricoModal() {
  document.getElementById('modal-historico').style.display = 'none';
}

// === EXPORTAR CSV ===
function exportCSV() {
  const catMap = {};
  getMateriais().forEach(m => { catMap[m.id] = m.categoria; });
  const allMovs = getMovimentacoes();
  const movsByCat = currentMovCategory
    ? allMovs.filter(m => catMap[m.materialId] === currentMovCategory)
    : allMovs;
  const { start, end } = getFilterWindow(currentPeriod);
  let movs = movsByCat.filter(m => { const d = new Date(m.data); return d >= start && d <= end; });
  if (currentMovSearch) movs = movs.filter(m => m.materialNome.toLowerCase().includes(currentMovSearch));
  if (currentMovTipo)   movs = movs.filter(m => m.tipo === currentMovTipo);
  movs = movs.sort((a, b) => new Date(b.data) - new Date(a.data));

  const header = ['Data/Hora', 'Material', 'Categoria', 'Tipo', 'Quantidade', 'Registrado por', 'Observação'];
  const rows = movs.map(m => {
    const d = new Date(m.data);
    const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    return [dateStr, m.materialNome, catMap[m.materialId] || '—', m.tipo, m.quantidade, m.registradoPor, m.observacao || '']
      .map(v => `"${String(v).replace(/"/g, '""')}"`)
      .join(',');
  });

  const csv = '﻿' + [header.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `movimentacoes_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function updateMovCatFilter() {
  const sel = document.getElementById('mov-cat-filter');
  if (!sel) return;
  const cats = getCategorias().slice().sort();
  sel.innerHTML = '<option value="">Todas as categorias</option>' +

}

function renderUserList() {
  const users = getUsuarios();
  document.getElementById('usuarios-tbody').innerHTML = users.map(u => {
    const isSelf = u.id === currentSession.usuarioId;
    const isAdmin = u.papel === 'admin';
    const roleCls = isAdmin ? 'badge-entrada' : 'badge-saida';
    const roleLabel = isAdmin ? 'Admin' : 'Viewer';
    return `<tr>

      <td><span class="badge ${roleCls}">${roleLabel}</span></td>
      <td>${isSelf
        ? `<span style="font-size:0.8125rem;color:var(--gray-600)">Você</span>`

      </td>

  }).join('');

function changeUserRole(id) {
  const user = getUsuarios().find(u => u.id === id);
  if (!user) return;
  const novoPapel = user.papel === 'admin' ? 'viewer' : 'admin';
  _sb.from('profiles').update({ papel: novoPapel }).eq('id', id).then(async ({ error }) => {
    if (error) { alert('Erro: ' + error.message); return; }
    await loadAllData();
    renderUserList();
  });
}

// === BACKUP E RESTAURAÇÃO ===
function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    materiais: getMateriais(),
    categorias: getCategorias(),
    movimentacoes: getMovimentacoes()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `autchronos_backup_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.materiais || !data.categorias)
        return alert('Arquivo inválido. Selecione um backup gerado por este sistema.');
      if (!confirm('Restaurar backup apagará todos os dados atuais do banco. Continuar?')) return;

      // Limpa dados existentes
      await _sb.from('movimentacoes').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      await _sb.from('materiais').delete().gt('id', 0);
      await _sb.from('categorias').delete().gt('id', 0);

      // Recria
      if (data.categorias.length) {
        await _sb.from('categorias').insert(data.categorias.map(nome => ({ nome })));
      }
      const idMap = {};
      if (data.materiais.length) {
        const { data: newMats, error: errMat } = await _sb.from('materiais').insert(data.materiais.map(m => ({
          nome: m.nome, categoria: m.categoria, quantidade: m.quantidade,
          unidade: m.unidade, estoque_minimo: m.estoqueMinimo || m.estoque_minimo || 0,
          valor_unitario: m.valorUnitario || m.valor_unitario || 0,
          localizacao: m.localizacao || null
        }))).select('id');
        if (errMat) throw new Error(errMat.message);
        data.materiais.forEach((m, i) => { if (newMats[i]) idMap[m.id] = newMats[i].id; });
      }
      if (data.movimentacoes && data.movimentacoes.length) {
        const movRows = data.movimentacoes
          .filter(m => idMap[m.materialId] != null)
          .map(m => ({
            material_id: idMap[m.materialId],
            material_nome: m.materialNome,
            tipo: m.tipo,
            quantidade: m.quantidade,
            registrado_por: m.registradoPor,
            observacao: m.observacao || null,
            data: m.data
          }));
        if (movRows.length) {
          const { error: errMovs } = await _sb.from('movimentacoes').insert(movRows);
          if (errMovs) throw new Error(errMovs.message);
        }
      }

      await loadAllData();
      alert('Backup restaurado com sucesso!');
      refreshAllSections();
    } catch(err) { alert('Erro ao restaurar: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

// === AJUSTE DE ESTOQUE ===
let ajusteMaterialId = null;
function openAjusteModal(id) {
  if (!guardAdmin()) return;
  ajusteMaterialId = id;
  const material = getMateriais().find(m => m.id === id);
  if (!material) return;
  document.getElementById('ajuste-material-nome').textContent = material.nome;
  const qa = material.quantidade % 1 === 0 ? material.quantidade : material.quantidade.toFixed(2);
  document.getElementById('ajuste-estoque-atual').textContent = `${qa} ${material.unidade}`;
  document.getElementById('ajuste-qtd').value = '';
  clearFieldError('err-ajuste-qtd');
  document.getElementById('modal-ajuste').style.display = 'flex';
  setTimeout(() => document.getElementById('ajuste-qtd').focus(), 50);
}
function closeAjusteModal() {
  document.getElementById('modal-ajuste').style.display = 'none';
  ajusteMaterialId = null;
}
async function saveAjuste() {
  const qtdRaw = document.getElementById('ajuste-qtd').value;
  clearFieldError('err-ajuste-qtd');
  const qtd = parseDecimal(qtdRaw);
  if (qtdRaw.trim() === '' || isNaN(qtd) || qtd < 0) {
    showFieldError('err-ajuste-qtd', 'Informe uma quantidade válida (≥ 0).');
    return;
  }
  const material = getMateriais().find(m => m.id === ajusteMaterialId);
  if (!material) return;
  if (qtd === material.quantidade) { closeAjusteModal(); return; }

  const btn = document.querySelector('button[onclick="saveAjuste()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Aplicando...'; }

  const fmt = n => n % 1 === 0 ? n : n.toFixed(2);
  const { error: errMov } = await _sb.from('movimentacoes').insert({
    material_id: material.id, material_nome: material.nome,
    tipo: 'ajuste', quantidade: qtd,
    registrado_por: currentSession.nomeCompleto,
    observacao: `Ajuste: ${fmt(material.quantidade)} → ${fmt(qtd)}`
  });
  if (errMov) { alert('Erro: ' + errMov.message); if (btn) { btn.disabled = false; btn.textContent = 'Aplicar Ajuste'; } return; }

  const { error: errUpd } = await _sb.from('materiais').update({ quantidade: qtd }).eq('id', material.id);
  if (errUpd) { alert('Erro ao atualizar estoque: ' + errUpd.message); if (btn) { btn.disabled = false; btn.textContent = 'Aplicar Ajuste'; } return; }

  await loadAllData();
  closeAjusteModal();
  refreshAllSections();
}

  const fill = el.querySelector('.loading-bar-fill');
  fill.style.animation = 'none';

  fill.style.animation = '';

  el.classList.remove('fade-out');

  renderDashboard(session);
  showScreen('dashboard');

  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => { el.style.display = 'none'; refreshAllSections(); }, 500);
  }, 1400);
}
